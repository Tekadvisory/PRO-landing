                    try {
                        const icons = window.lucide.icons || window.lucide;
                        const iconNode = icons ? icons[name] : null;
                        if (iconNode) {
                            const svgString = iconNode[2].map(tag => {
                                const attrs = Object.entries(tag[1]).map(([k, v]) => `${k}="${v}"`).join(' ');
                                return `<${tag[0]} ${attrs}></${tag[0]}>`;
                            }).join('');
                            
                            containerRef.current.innerHTML = `
                                <svg 
                                    xmlns="http://www.w3.org/2000/svg" 
                                    width="${size}" 
                                    height="${size}" 
                                    viewBox="0 0 24 24" 
                                    fill="none" 
                                    stroke="currentColor" 
                                    stroke-width="2" 
                                    stroke-linecap="round" 
                                    stroke-linejoin="round"
                                    class="lucide lucide-${name} ${className}"
                                >
                                    ${svgString}
                                </svg>
                            `;
                        }
                    } catch (e) {
                        console.error("Lucide icon error:", e);
                    }
                }

            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let width = canvas.width = canvas.offsetWidth;
                let height = canvas.height = canvas.offsetHeight;
                const nodes = Array.from({ length: 20 }).map(() => ({
                    x: Math.random() * width, y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
                }));
                function draw() {
                    if (!canvas || !ctx) return;
                    ctx.clearRect(0, 0, width, height);
                    ctx.strokeStyle = 'rgba(212, 175, 55, 0.1)';
                    nodes.forEach((node, i) => {
                        node.x += node.vx; node.y += node.vy;
                        if (node.x < 0 || node.x > width) node.vx *= -1;
                        if (node.y < 0 || node.y > height) node.vy *= -1;
                        ctx.fillStyle = '#d4af37';
                        ctx.beginPath(); ctx.arc(node.x, node.y, 2, 0, Math.PI * 2); ctx.fill();
                        nodes.forEach((n2, j) => {
                            const dist = Math.hypot(node.x - n2.x, node.y - n2.y);
                            if (dist < 150) {
                                ctx.globalAlpha = 0.3 * (1 - dist/150);
                                ctx.beginPath(); ctx.moveTo(node.x, node.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                            }
                        });
                    });
                    requestAnimationFrame(draw);
                }
                draw();

                                </div>
                                <div className="glass-panel p-8 rounded-3xl">
                                    <h4 className="text-xl font-bold mb-4 flex items-center gap-3"><Icons.Binary className="text-gold" /> Sanction Engine</h4>
                                    <p className="text-slate-400 text-sm">Predictive modeling of financial decoupling and digital iron curtains.</p>
                                </div>
                            </div>
                        </div>
                        <div className="h-[600px] glass-panel rounded-3xl border-red-500/20 bg-red-500/5 flex items-center justify-center relative">
                            <Icons.Radar size={120} className="text-red-500 opacity-20 animate-pulse" />
                            <div className="absolute inset-x-0 bottom-0 p-8 glass-panel border-t border-red-500/20">
                                <p className="font-mono text-xs text-red-400">ACTIVE_SIMULATION_V2.0: MONITORING_NODES_STRAIT</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const Doctrine = ({ t }) => (
            <section className="py-32 px-6 bg-black/40">
                <div className="max-w-7xl mx-auto">
                    <SectionHeading subtitle={t.visionSection.subtitle} title={t.visionSection.title} />
                    <div className="grid md:grid-cols-3 gap-12 mt-16">
                        {t.visionSection.pillars.map((p, i) => (
                            <div key={i} className="glass-panel p-10 rounded-3xl border-white/5 hover:border-gold/30 transition-all">
                                <div className="w-12 h-12 bg-gold/10 flex items-center justify-center text-gold rounded-xl mb-8">
                                    <Icons.Target />
                                </div>
                                <h3 className="text-2xl font-bold mb-4">{p.title}</h3>
                                <p className="text-slate-400 font-mono text-sm leading-relaxed">{p.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const Foundry = ({ lang, t }) => {
            const industryFilters = Array.from(new Set(AI_PROJECTS.map(p => p.industry)));
            const [filter, setFilter] = useState('all');
            const filtered = filter === 'all' ? AI_PROJECTS : AI_PROJECTS.filter(p => p.industry === filter);

            return (
                <div className="pt-48 pb-32 px-6 bg-white min-h-screen text-slate-900">
                    <div className="max-w-7xl mx-auto">
                        <SectionHeading subtitle={t.foundryPage.subtitle} title={t.foundryPage.title} theme="light" />
                        <div className="flex flex-wrap gap-4 mb-20 p-8 bg-slate-100 rounded-3xl">
                            <button onClick={() => setFilter('all')} className={`px-6 py-2 rounded-full font-mono text-xs uppercase font-bold border ${filter === 'all' ? 'bg-black text-white' : 'border-slate-300 shadow-sm'}`}>{t.foundryPage.filters.all}</button>
                            {industryFilters.map(f => (
                                <button key={f} onClick={() => setFilter(f)} className={`px-6 py-2 rounded-full font-mono text-xs uppercase font-bold border ${filter === f ? 'bg-black text-white' : 'border-slate-300 shadow-sm'}`}>{f}</button>
                            ))}
                        </div>
                        <div className="grid lg:grid-cols-2 gap-8">
                            {filtered.map(p => (
                                <div key={p.id} className="p-10 bg-slate-50 border border-slate-200 rounded-3xl hover:border-gold transition-all shadow-sm hover:shadow-xl">
                                    <div className="flex justify-between items-start mb-6">
                                        <h3 className="text-3xl font-bold">{p.name}</h3>
                                        <span className="px-2 py-1 bg-gold/10 text-gold font-mono text-[9px] font-bold rounded uppercase">{p.status}</span>
                                    </div>
                                    <p className="text-slate-600 mb-8 font-mono text-sm font-bold leading-relaxed">{p.description[lang]}</p>
                                    <div className="flex gap-2">
                                        {p.tech.map(tag => <span key={tag} className="px-3 py-1 bg-white border border-slate-200 rounded text-[10px] font-mono font-bold">{tag}</span>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const Contact = ({ t }) => {
            const [sent, setSent] = useState(false);
            return (
                <div className="pt-48 pb-32 px-6 min-h-screen">
                    <div className="max-w-3xl mx-auto glass-panel p-12 lg:p-20 rounded-[3rem] shadow-2xl">
                        <SectionHeading subtitle={t.contactPage.subtitle} title={t.contactPage.title} />
                        {sent ? (
                            <div className="text-center py-20">
                                <Icons.CheckCircle2 size={64} className="text-gold mx-auto mb-8" />
                                <p className="text-2xl font-bold">Transmission Successful</p>
                                <p className="text-slate-400 mt-4">{t.contactPage.labels.success}</p>
                            </div>
                        ) : (
                            <form className="space-y-8 mt-12" onSubmit={(e) => { e.preventDefault(); setSent(true); }}>
                                <div className="space-y-2">
                                    <label className="font-mono text-[10px] uppercase font-bold text-gold">{t.contactPage.labels.name}</label>
                                    <input required type="text" className="w-full bg-black/40 border border-white/10 p-5 rounded-2xl outline-none focus:border-gold transition-all shadow-inner" />
                                </div>
                                <div className="space-y-2">
                                    <label className="font-mono text-[10px] uppercase font-bold text-gold">{t.contactPage.labels.email}</label>
                                    <input required type="email" className="w-full bg-black/40 border border-white/10 p-5 rounded-2xl outline-none focus:border-gold transition-all shadow-inner" />
                                </div>
                                <div className="space-y-2">
                                    <label className="font-mono text-[10px] uppercase font-bold text-gold">{t.contactPage.labels.message}</label>
                                    <textarea required rows="4" className="w-full bg-black/40 border border-white/10 p-5 rounded-2xl outline-none focus:border-gold transition-all resize-none shadow-inner" />
                                </div>
                                <button type="submit" className="w-full py-5 bg-gold text-black font-black uppercase tracking-widest rounded-2xl hover:bg-white transition-all shadow-xl">{t.contactPage.labels.submit}</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        // --- App Root ---
        const App = () => {
            const [lang, setLang] = useState('en');
            const [page, setPage] = useState('home');
            const t = UI_TEXT[lang];

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'instant' });
            }, [page]);

            const render = () => {
                switch(page) {
                    case 'foundry': return <Foundry lang={lang} t={t} />;
                    case 'contact': return <Contact t={t} />;
                    case 'manifesto': return <Manifesto lang={lang} t={t} />;
                    case 'taiwan': return <TaiwanSimulation lang={lang} />;
                    default: return (
                        <div className="animate-in fade-in duration-1000">
                            <Hero t={t} setPage={setPage} />
                            <Doctrine t={t} />
                            <section className="py-24 bg-gold text-black text-center mt-32">
                                <h2 className="text-5xl font-extrabold mb-12">Recover the Lead.</h2>
                                <button onClick={() => setPage('contact')} className="px-12 py-5 bg-black text-white font-black uppercase tracking-widest rounded-xl hover:scale-105 transition-all shadow-2xl">Establish Session</button>
                            </section>
                        </div>
                    );
                }
            };

            const bgColor = page === 'foundry' ? 'bg-white' : 'bg-obsidian';

            return (
                <div className={`min-h-screen transition-colors duration-1000 ${bgColor}`}>
                    <Navbar lang={lang} setLang={setLang} page={page} setPage={setPage} />
                    <main>{render()}</main>
                    <footer className="py-20 px-6 border-t border-white/10 bg-black">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                            <div className="flex items-center gap-3">
                                <Icons.Flame size={32} className="text-gold" />
                                <span className="font-bold text-2xl">Prometheus Advisory</span>
                            </div>
                            <div className="flex gap-10 font-mono text-[10px] uppercase font-bold text-slate-500 tracking-widest">
                                <button className="hover:text-gold transition-colors">Protocols</button>
                                <button className="hover:text-gold transition-colors">Data Policy</button>
                                <button className="hover:text-gold transition-colors shadow-none">Theory of Action</button>
                            </div>
                            <p className="font-mono text-[9px] opacity-40 uppercase font-black">© 2025 PROMETHEUS ADVISORY GROUP</p>
                        </div>
                    </footer>
                </div>
            );
        };

        // --- Render ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
